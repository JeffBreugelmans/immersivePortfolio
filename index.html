<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Career World Explorer</title>
  </head>
  <body>
    <a-scene
      id="main-scene"
      webxr="optionalFeatures: hand-tracking;"
      loading-screen="dotsColor: white; backgroundColor: black"
    >
      <a-assets></a-assets>

      <!-- Populated at runtime by scene-manager.js based on manifest.js -->
      <a-entity id="current-scene-root"></a-entity>
      <a-entity id="portal-root"></a-entity>

      <a-entity light="type: ambient; intensity: 0.6"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="1 3 1"></a-entity>

      <a-entity id="camera-rig" camera look-controls wasd-controls position="0 1.6 3">
        <a-entity
          cursor="fuse: false"
          raycaster="objects: .clickable"
          position="0 0 -1"
          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
          material="color: white; shader: flat"
        ></a-entity>
      </a-entity>
    </a-scene>

    <div id="chat-overlay">
      <div id="chat-header">
        <img
          id="avatar-img"
          src="https://images.squarespace-cdn.com/content/v1/63d97f26da579b2cafb101da/a3e81bda-8aec-460b-916c-54539a05d053/avatar_hello.PNG?format=500w"
          alt="Jeff avatar"
        />
        <div id="chat-header-text">
          <span id="avatar-name">JB Proxie</span>
          <span id="scene-label">Loading...</span>
        </div>
      </div>
      <div id="chat-log"></div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Ask Proxie about this scene..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
