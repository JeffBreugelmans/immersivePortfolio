<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Career World Explorer</title>
  </head>
  <body>
    <!-- IWSDK mounts its WebGL canvas here (see src/index.ts) -->
    <div id="scene-container"></div>

    <!-- Fullscreen loading state while a scene's splat streams in;
         driven by the scene-loading / scene-changed window events. -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span id="loading-title">Loading...</span>
    </div>

    <!-- Shown only when the browser reports immersive-vr support -->
    <button id="enter-vr" hidden>Enter VR</button>

    <div id="chat-overlay">
      <div id="chat-header">
        <img
          id="avatar-img"
          src="https://images.squarespace-cdn.com/content/v1/63d97f26da579b2cafb101da/a3e81bda-8aec-460b-916c-54539a05d053/avatar_hello.PNG?format=500w"
          alt="Jeff avatar"
        />
        <div id="chat-header-text">
          <span id="avatar-name">JB Proxie</span>
          <span id="scene-label">Loading...</span>
        </div>
        <button id="chat-mute" type="button" title="Toggle Proxie's voice" aria-label="Toggle Proxie's voice">🔊</button>
      </div>
      <div id="chat-log"></div>
      <form id="chat-form">
        <!-- Mic button is unhidden by proxie-chat.js only when the browser
             supports the Web Speech API (Chrome/Edge); everywhere else the
             text input is the sole path. -->
        <button id="chat-mic" type="button" hidden title="Hold to talk to Proxie" aria-label="Hold to talk to Proxie">🎙</button>
        <input id="chat-input" type="text" placeholder="Ask Proxie about this scene..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
